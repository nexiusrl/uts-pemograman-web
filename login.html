<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Staf | Summarecon Mutiara Makassar</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background-color: var(--bg-light);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      border: none;
      border-radius: 0;
      padding: 30px;
    }
  </style>
</head>

<body>
  <!-- Simple Header -->
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container justify-content-center">
      <a class="navbar-brand" href="index.html">Summarecon Mutiara Makassar</a>
    </div>
  </nav>

  <!-- Login Form Section -->
  <main class="login-container">
    <div class="card login-card shadow-sm">
      <div class="card-body">
        <h3 class="text-center mb-4">Akses Staf</h3>
        <p class="text-center text-muted small mb-4">
          Silakan masukkan kredensial Anda untuk mengelola inventaris.
        </p>

        <!-- HTML5 Form with action pointing to admin.html for demonstration -->
        <form action="admin.html" method="GET">
          <div class="mb-3">
            <label for="username" class="form-label small text-uppercase fw-bold">Username</label>
            <input type="text" class="form-control rounded-0" id="username" name="username"
              placeholder="Masukkan username" required />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label small text-uppercase fw-bold">Password</label>
            <input type="password" class="form-control rounded-0" id="password" name="password"
              placeholder="Masukkan password" required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-dark-minimal btn-minimal">
              Masuk
            </button>
          </div>
        </form>

        <div class="mt-4 text-center">
          <a href="index.html" class="text-decoration-none text-muted small">&larr; Kembali ke Beranda</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Simple Footer -->
  <footer class="py-3 mt-auto">
    <div class="container text-center">
      <p class="small text-secondary mb-0">
        &copy; 2026 Summarecon Mutiara Makassar.
      </p>
    </div>
  </footer>
</body>

</html>
